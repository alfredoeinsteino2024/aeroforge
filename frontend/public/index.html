<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AeroForge — Wing Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e6f0; min-height: 100vh; }
    header { display: flex; align-items: center; gap: 12px; padding: 16px 32px; border-bottom: 1px solid #1e2d4a; background: #0d1220; }
    header h1 { font-size: 22px; font-weight: 700; color: #60aaff; letter-spacing: 1px; }
    header span { font-size: 12px; color: #3a5a8a; margin-left: 4px; }
    .layout { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 57px); }
    .sidebar { background: #0d1220; border-right: 1px solid #1e2d4a; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
    .section-title { font-size: 11px; font-weight: 600; color: #3a5a8a; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
    .card { background: #131929; border: 1px solid #1e2d4a; border-radius: 10px; padding: 12px; }
    .control-group { margin-bottom: 8px; }
    .control-group:last-child { margin-bottom: 0; }
    .control-group label { display: flex; justify-content: space-between; font-size: 12px; color: #6a7a9a; margin-bottom: 5px; }
    .control-group label span { color: #c0d0f0; font-weight: 600; }
    input[type=range] { width: 100%; accent-color: #60aaff; height: 4px; }
    .run-btn { width: 100%; padding: 11px; background: #1a4fd6; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .run-btn:hover { background: #2260ff; }
    .run-btn:disabled { background: #1e2d4a; color: #3a4a6a; cursor: not-allowed; }
    .status { font-size: 11px; text-align: center; margin-top: 8px; color: #3a6a9a; }
    .status.ready { color: #40cc80; }
    .status.error { color: #e05050; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .result-box { background: #0d1526; border: 1px solid #1e2d4a; border-radius: 8px; padding: 10px; text-align: center; }
    .result-box .rlabel { font-size: 10px; color: #3a5a8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .result-box .rnum { font-size: 20px; font-weight: 700; color: #60aaff; }
    .result-box.good .rnum { color: #40cc80; }
    .result-box.warn .rnum { color: #f0a030; }
    .result-box.bad  .rnum { color: #e05050; }
    .result-box .runit { font-size: 10px; color: #2a3a5a; margin-top: 2px; }
    .viewport { display: grid; grid-template-rows: 1fr 200px; background: #080c16; }
    #three-canvas { width: 100%; height: 100%; display: block; }
    .chart-panel { background: #0d1220; border-top: 1px solid #1e2d4a; padding: 12px 20px; }
    .chart-panel h3 { font-size: 11px; color: #3a5a8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    canvas#chart { width: 100%; height: 150px; display: block; }
  </style>
</head>
<body>

<header>
  <h1>⚡ AeroForge</h1>
  <span>Wing Aerodynamics Simulator — C + WebAssembly + Three.js</span>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="card">
      <div class="section-title">Wing Geometry</div>
      <div class="control-group">
        <label>Wingspan <span id="spanVal">10.0 m</span></label>
        <input type="range" id="span" min="2" max="30" value="10" step="0.5" oninput="update('span','spanVal',this.value,' m')">
      </div>
      <div class="control-group">
        <label>Root Chord <span id="rcVal">1.5 m</span></label>
        <input type="range" id="root_chord" min="0.5" max="5" value="1.5" step="0.1" oninput="update('root_chord','rcVal',this.value,' m')">
      </div>
      <div class="control-group">
        <label>Tip Chord <span id="tcVal">1.5 m</span></label>
        <input type="range" id="tip_chord" min="0.1" max="5" value="1.5" step="0.1" oninput="update('tip_chord','tcVal',this.value,' m')">
      </div>
      <div class="control-group">
        <label>Sweep Angle <span id="swVal">0°</span></label>
        <input type="range" id="sweep" min="0" max="60" value="0" step="1" oninput="update('sweep','swVal',this.value,'°')">
      </div>
      <div class="control-group">
        <label>Dihedral <span id="dhVal">0°</span></label>
        <input type="range" id="dihedral" min="0" max="15" value="0" step="0.5" oninput="update('dihedral','dhVal',this.value,'°')">
      </div>
    </div>

    <div class="card">
      <div class="section-title">Flight Conditions</div>
      <div class="control-group">
        <label>Angle of Attack <span id="aoaVal">5°</span></label>
        <input type="range" id="aoa" min="-5" max="20" value="5" step="0.5" oninput="update('aoa','aoaVal',this.value,'°')">
      </div>
      <div class="control-group">
        <label>Airspeed <span id="velVal">50 m/s</span></label>
        <input type="range" id="velocity" min="10" max="300" value="50" step="5" oninput="update('velocity','velVal',this.value,' m/s')">
      </div>
    </div>

    <div class="card">
      <div class="section-title">Aerodynamic Results</div>
      <div class="results-grid">
        <div class="result-box" id="box-cl"><div class="rlabel">Lift CL</div><div class="rnum" id="res-cl">—</div><div class="runit">coefficient</div></div>
        <div class="result-box" id="box-cd"><div class="rlabel">Drag CD</div><div class="rnum" id="res-cd">—</div><div class="runit">coefficient</div></div>
        <div class="result-box" id="box-ld"><div class="rlabel">L/D Ratio</div><div class="rnum" id="res-ld">—</div><div class="runit">efficiency</div></div>
        <div class="result-box" id="box-cm"><div class="rlabel">Pitch CM</div><div class="rnum" id="res-cm">—</div><div class="runit">moment</div></div>
      </div>
      <div style="margin-top:12px">
        <div class="result-box" id="box-lift">
          <div class="rlabel">Actual Lift Force</div>
          <div class="rnum" id="res-lift">—</div>
          <div class="runit">Newtons</div>
        </div>
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runSolver()" disabled>Loading engine...</button>
    <div class="status" id="status">Initializing WebAssembly...</div>
  </div>

  <div class="viewport">
    <canvas id="three-canvas"></canvas>
    <div class="chart-panel">
      <h3>CL vs Angle of Attack</h3>
      <canvas id="chart"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="aero.js"></script>
<script>

/* ── STATE ── */
const vals = { span:10, root_chord:1.5, tip_chord:1.5, sweep:0, dihedral:0, aoa:5, velocity:50 };

function update(key, labelId, val, unit) {
  vals[key] = parseFloat(val);
  document.getElementById(labelId).textContent = val + unit;
  if (engine) { runSolver(); buildWing(); buildStreamlines(); }
}

/* ── WASM ── */
let engine=null, wingPtr=null, resultPtr=null;
const WING_SIZE=48, RESULT_SIZE=44;

AeroEngine().then(mod => {
  engine    = mod;
  wingPtr   = mod._malloc(WING_SIZE);
  resultPtr = mod._malloc(RESULT_SIZE);
  document.getElementById('runBtn').disabled    = false;
  document.getElementById('runBtn').textContent = 'Run Simulation';
  document.getElementById('status').textContent = 'Engine ready ✓';
  document.getElementById('status').className   = 'status ready';
  runSolver(); buildWing(); buildStreamlines();
}).catch(e => {
  document.getElementById('status').textContent = 'Engine failed: ' + e;
  document.getElementById('status').className   = 'status error';
});

function writeWing(mod, ptr, g) {
  const h = new DataView(mod.HEAPU8.buffer); let o = ptr;
  h.setFloat64(o, g.span,       true); o+=8;
  h.setFloat64(o, g.root_chord, true); o+=8;
  h.setFloat64(o, g.tip_chord,  true); o+=8;
  h.setFloat64(o, g.sweep,      true); o+=8;
  h.setFloat64(o, g.dihedral,   true); o+=8;
  h.setInt32  (o, 1,            true); o+=4;
  h.setInt32  (o, 8,            true);
}

function readResult(mod, ptr) {
  const h = new DataView(mod.HEAPU8.buffer); let o = ptr;
  const CL=h.getFloat64(o,true); o+=8;
  const CD=h.getFloat64(o,true); o+=8;
  const CM=h.getFloat64(o,true); o+=8;
  const LD=h.getFloat64(o,true); o+=8;
  const stall=h.getFloat64(o,true); o+=8;
  const conv=h.getInt32(o,true);
  return { CL, CD, CM, LD, stall, conv };
}

function runSolver() {
  if (!engine) return;
  writeWing(engine, wingPtr, vals);
  engine._run_vlm_solver(resultPtr, wingPtr, vals.aoa, vals.velocity);
  const r = readResult(engine, resultPtr);
  displayResults(r);
  drawChart();
}

function displayResults(r) {
  const rho=1.225, S=vals.span*0.5*(vals.root_chord+vals.tip_chord);
  const q=0.5*rho*vals.velocity*vals.velocity, L=r.CL*q*S;
  document.getElementById('res-cl').textContent = r.CL.toFixed(4);
  document.getElementById('res-cd').textContent = r.CD.toFixed(4);
  document.getElementById('res-ld').textContent = r.LD.toFixed(1);
  document.getElementById('res-cm').textContent = r.CM.toFixed(4);
  document.getElementById('res-lift').textContent = L.toFixed(0)+' N';
  document.getElementById('box-cl').className  = 'result-box '+(r.CL>0.6?'warn':r.CL>0?'good':'bad');
  document.getElementById('box-ld').className  = 'result-box '+(r.LD>20?'good':r.LD>5?'warn':'bad');
  document.getElementById('box-lift').className= 'result-box '+(L>0?'good':'bad');
}

/* ── THREE.JS SETUP ── */
const canvas3d = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x080c16);
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(8, 6, 14);
camera.lookAt(0, 0, 0);
scene.add(new THREE.GridHelper(30, 30, 0x1a2840, 0x111a2e));
scene.add(new THREE.AxesHelper(5));
scene.add(new THREE.AmbientLight(0x334466, 1.5));
const sun = new THREE.DirectionalLight(0x8ab4ff, 2.0);
sun.position.set(10, 20, 10);
scene.add(sun);

let isDragging=false, lastX=0, lastY=0, theta=0.4, phi=0.5, radius=18;
canvas3d.addEventListener('mousedown', e=>{ isDragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', ()=>isDragging=false);
window.addEventListener('mousemove', e=>{
  if (!isDragging) return;
  theta -= (e.clientX-lastX)*0.01;
  phi   -= (e.clientY-lastY)*0.01;
  phi    = Math.max(0.05, Math.min(Math.PI/2-0.05, phi));
  lastX=e.clientX; lastY=e.clientY;
  updateCamera();
});
canvas3d.addEventListener('wheel', e=>{
  radius = Math.max(5, Math.min(50, radius+e.deltaY*0.02));
  updateCamera();
});
function updateCamera() {
  camera.position.set(
    radius*Math.sin(theta)*Math.cos(phi),
    radius*Math.sin(phi),
    radius*Math.cos(theta)*Math.cos(phi)
  );
  camera.lookAt(0,0,0);
}
updateCamera();

/* ── WING BUILDER ── */
let wingMesh=null, wingEdge=null;
function buildWing() {
  if (wingMesh) { scene.remove(wingMesh); wingMesh.geometry.dispose(); }
  if (wingEdge) { scene.remove(wingEdge); wingEdge.geometry.dispose(); }
  const { span, root_chord, tip_chord, sweep, dihedral } = vals;
  const hs=span/2, sw=Math.tan(sweep*Math.PI/180), dh=Math.tan(dihedral*Math.PI/180);
  const geo=new THREE.BufferGeometry();
  const positions=[], colors=[], indices=[];
  const NY=20, NX=6;
  function addHalf(side) {
    const base=positions.length/3;
    for (let j=0;j<=NY;j++) {
      const eta=j/NY, c=root_chord+(tip_chord-root_chord)*eta;
      const xle=eta*hs*sw, y=side*eta*hs, z=eta*hs*dh;
      for (let i=0;i<=NX;i++) {
        const xi=i/NX;
        positions.push(xle+xi*c, z, y);
        const t=1-xi, cl_norm=Math.max(0,Math.min(1,(vals.aoa+5)/25));
        colors.push(t*cl_norm, 0.1, (1-t)*0.6+0.1);
      }
    }
    for (let j=0;j<NY;j++) for (let i=0;i<NX;i++) {
      const a=base+j*(NX+1)+i, b=a+1, c=base+(j+1)*(NX+1)+i, d=c+1;
      indices.push(a,b,d, a,d,c);
    }
  }
  addHalf(+1); addHalf(-1);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors,3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  wingMesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
    vertexColors:true, side:THREE.DoubleSide, shininess:60, specular:0x224488
  }));
  scene.add(wingMesh);
  wingEdge = new THREE.LineSegments(
    new THREE.WireframeGeometry(geo),
    new THREE.LineBasicMaterial({ color:0x1a3a6a, transparent:true, opacity:0.3 })
  );
  scene.add(wingEdge);
}

/* ── STREAMLINES ── */
let streamlineGroup=null, streamParticles=[];
const NLINES=24, NSEGS=40;

function buildStreamlines() {
  if (streamlineGroup) {
    streamParticles.forEach(p => scene.remove(p.sphere));
    scene.remove(streamlineGroup);
    streamlineGroup.children.forEach(c => c.geometry.dispose());
  }
  streamlineGroup = new THREE.Group();
  streamParticles = [];
  const { span, root_chord, tip_chord, sweep, dihedral, aoa } = vals;
  const hs=span/2, sw=Math.tan(sweep*Math.PI/180), dh=Math.tan(dihedral*Math.PI/180);

  for (let li=0; li<NLINES; li++) {
    const side  = li < NLINES/2 ? 1 : -1;
    const etaS  = li < NLINES/2 ? (li/(NLINES/2-1)) : ((li-NLINES/2)/(NLINES/2-1));
    const c     = root_chord+(tip_chord-root_chord)*etaS;
    const xle   = etaS*hs*sw;
    const yPos  = side*etaS*hs;
    const zPos  = etaS*hs*dh;
    const points= [];

    for (let si=0; si<NSEGS; si++) {
      const t    = si/(NSEGS-1);
      const xOff = (t-0.3)*c*3.5;
      let zDef   = 0;
      if (t>0.1 && t<0.9) {
        const u=(t-0.1)/0.8;
        const cl_now=Math.max(0,(aoa+2)/20);
        zDef = Math.sin(u*Math.PI)*c*0.18*cl_now;
      }
      let jitter=0;
      if (aoa>13) jitter=(Math.random()-0.5)*((aoa-13)/7)*c*0.15;
      points.push(new THREE.Vector3(yPos, zPos+zDef+jitter, xle+xOff));
    }  /* ← this closing brace was missing */

    const curve = new THREE.CatmullRomCurve3(points);
    const linGeo= new THREE.BufferGeometry().setFromPoints(curve.getPoints(NSEGS));
    const an    = Math.max(0,Math.min(1,(aoa+5)/25));
    const col   = new THREE.Color(0.2+an*0.6, 0.7, 1.0-an*0.3);
    streamlineGroup.add(new THREE.Line(linGeo,
      new THREE.LineBasicMaterial({ color:col, transparent:true, opacity:0.55 })));

    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.04,4,4),
      new THREE.MeshBasicMaterial({ color:col })
    );
    scene.add(sphere);
    streamParticles.push({ curve, sphere, offset: li/NLINES });
  }
  scene.add(streamlineGroup);
}

/* ── STALL WARNING ── */
let stallFlash=0;
function updateStallWarning() {
  if (!wingMesh) return;
  if (vals.aoa>13) {
    stallFlash+=0.12;
    const i=0.5+0.5*Math.sin(stallFlash*8);
    wingMesh.material.emissive = new THREE.Color(i*0.4,0,0);
    wingMesh.material.emissiveIntensity=1;
  } else {
    stallFlash=0;
    wingMesh.material.emissive=new THREE.Color(0,0,0);
    wingMesh.material.emissiveIntensity=0;
  }
}

/* ── ANIMATE ── */
let streamT=0, lastTime=performance.now();
function animateStreamlines(delta) {
  streamT += delta*0.18;
  streamParticles.forEach(p => {
    const pos = p.curve.getPoint((streamT+p.offset)%1);
    p.sphere.position.copy(pos);
  });
}

function resizeRenderer() {
  const w=canvas3d.clientWidth, h=canvas3d.clientHeight;
  if (renderer.domElement.width!==w || renderer.domElement.height!==h) {
    renderer.setSize(w,h,false);
    camera.aspect=w/h;
    camera.updateProjectionMatrix();
  }
}

function animate() {
  requestAnimationFrame(animate);
  resizeRenderer();
  const now=performance.now(), delta=(now-lastTime)/1000;
  lastTime=now;
  animateStreamlines(delta);
  updateStallWarning();
  renderer.render(scene,camera);
}
animate();

/* ── CHART ── */
function drawChart() {
  if (!engine) return;
  const canvas=document.getElementById('chart');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth*devicePixelRatio;
  canvas.height=canvas.offsetHeight*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
  const W=canvas.offsetWidth, H=canvas.offsetHeight;
  const pad={top:10,right:16,bottom:28,left:42};
  const aoas=[], cls=[];
  for (let a=-4;a<=16;a+=1) {
    writeWing(engine,wingPtr,vals);
    engine._run_vlm_solver(resultPtr,wingPtr,a,vals.velocity);
    aoas.push(a); cls.push(readResult(engine,resultPtr).CL);
  }
  const clMin=-0.1, clMax=1.4;
  function px(a)  { return pad.left+(a+4)/20*(W-pad.left-pad.right); }
  function py(cl) { return pad.top+(1-(cl-clMin)/(clMax-clMin))*(H-pad.top-pad.bottom); }
  ctx.fillStyle='#0d1526'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#1a2840'; ctx.lineWidth=1;
  [-4,0,4,8,12,16].forEach(a=>{ ctx.beginPath(); ctx.moveTo(px(a),pad.top); ctx.lineTo(px(a),H-pad.bottom); ctx.stroke(); });
  [0,0.25,0.5,0.75,1.0].forEach(c=>{ ctx.beginPath(); ctx.moveTo(pad.left,py(c)); ctx.lineTo(W-pad.right,py(c)); ctx.stroke(); });
  ctx.strokeStyle='#2a3a5a';
  ctx.beginPath(); ctx.moveTo(pad.left,py(0)); ctx.lineTo(W-pad.right,py(0)); ctx.stroke();
  ctx.strokeStyle='#60aaff'; ctx.lineWidth=2;
  ctx.beginPath();
  aoas.forEach((a,i)=>i===0?ctx.moveTo(px(a),py(cls[i])):ctx.lineTo(px(a),py(cls[i])));
  ctx.stroke();
  ctx.fillStyle='rgba(220,80,80,0.08)';
  ctx.fillRect(px(14),pad.top,px(16)-px(14),H-pad.top-pad.bottom);
  const idx=Math.round(vals.aoa+4);
  const curCL=cls[Math.max(0,Math.min(cls.length-1,idx))];
  ctx.fillStyle='#60aaff';
  ctx.beginPath(); ctx.arc(px(vals.aoa),py(curCL),4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#3a5a8a'; ctx.font='10px Segoe UI'; ctx.textAlign='center';
  [-4,0,4,8,12,16].forEach(a=>ctx.fillText(a+'°',px(a),H-8));
  ctx.textAlign='right';
  [0,0.5,1.0].forEach(c=>ctx.fillText(c.toFixed(1),pad.left-4,py(c)+4));
}

</script>
</body>
</html>
